<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="./index.js"></script>
    <title>PyramideDesign</title>
  </head>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

      <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-gray-800">
          Cálculo de Pirâmide Hexagonal
        </h1>
        <p class="text-gray-500 text-sm">
          Informe os valores abaixo
        </p>
      </header>

      <main>
        <section class="flex flex-col gap-4">

          <div>
            <label for="aresta" class="block text-sm font-medium text-gray-700 mb-1">
              Valor da aresta
            </label>
            <input
              type="number"
              name="aresta"
              id="aresta"
              placeholder="Ex: 10"
              class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label for="altura" class="block text-sm font-medium text-gray-700 mb-1">
              Valor da altura
            </label>
            <input
              type="number"
              name="altura"
              id="altura"
              placeholder="Ex: 15"
              class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <button
            id="btn"
            class="mt-4 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
          >
            Calcular
          </button>
          <div id="resp">

          </div>

        </section>
      </main>

      <footer class="mt-6 text-center text-sm text-gray-500">
        <p>Ueslei Carvalho - Carvalho Software®</p>
      </footer>

    </div>

  </body>
</html>
